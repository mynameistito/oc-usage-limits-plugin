name: Feature request
description: Suggest an improvement.
labels: [enhancement]
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any other approaches you considered?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Anything else that helps.
    validations:
      required: false
